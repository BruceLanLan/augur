{% extends "base.html" %}
{% block title %}设置 - Augur{% endblock %}
{% block extra_head %}
<style>
.settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 12px;
}
.persona-config-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    transition: border-color 0.2s;
}
.persona-config-row:hover {
    border-color: var(--accent-orange);
}
.persona-config-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border-color);
    object-fit: cover;
    flex-shrink: 0;
}
.persona-config-info {
    flex: 1;
    min-width: 0;
}
.persona-config-name {
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--text-primary);
}
.persona-config-style {
    font-size: 0.7rem;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.save-persona-btn {
    background: transparent;
    border: 1px solid var(--border-color);
    color: var(--accent-orange);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font-ui);
    white-space: nowrap;
}
.save-persona-btn:hover {
    background: var(--accent-orange);
    color: #000;
    border-color: var(--accent-orange);
}
</style>
{% endblock %}

{% block content %}

<div class="flex items-center justify-between mb-24" style="flex-wrap:wrap; gap:12px;">
    <div>
        <h2 style="color:var(--accent-orange); margin:0;">模型配置</h2>
        <p class="text-muted" style="font-size:0.82rem; margin:4px 0 0;">为每位投资大师分配 LLM 模型</p>
    </div>
    <button class="btn btn-primary" onclick="saveAll()">全部保存</button>
</div>

<div class="settings-grid" id="persona-grid">
    {% for persona in personas %}
    <div class="persona-config-row" data-agent-id="{{ persona.id }}">
        <img src="/docs/images/avatars/{{ persona.id }}.svg"
             alt="{{ persona.name }}"
             class="persona-config-avatar"
             onerror="this.style.display='none'">
        <div class="persona-config-info">
            <div class="persona-config-name">{{ persona.name }}</div>
            <div class="persona-config-style">{{ persona.style }}</div>
        </div>
        <select class="form-select" data-agent-id="{{ persona.id }}" style="min-width:140px; max-width:180px;">
            {% for model in available_models %}
            <option value="{{ model }}" {% if model == persona.current_model %}selected{% endif %}>{{ model }}</option>
            {% endfor %}
        </select>
        <button class="save-persona-btn" onclick="savePersona('{{ persona.id }}')">保存</button>
    </div>
    {% endfor %}
</div>

{% endblock %}

{% block extra_scripts %}
<script>
function savePersona(agentId) {
    var select = document.querySelector('select[data-agent-id="' + agentId + '"]');
    var model = select.value;
    fetch('/api/config/persona/' + agentId, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({model: model})
    })
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
        if (data.status === 'ok') {
            showToast(agentId + ' 模型已更新为 ' + model);
        } else {
            showToast('保存失败: ' + (data.detail || '未知错误'), 'error');
        }
    })
    .catch(function(err) {
        showToast('请求失败: ' + err.message, 'error');
    });
}

function saveAll() {
    var cards = document.querySelectorAll('.persona-config-row');
    var promises = [];
    cards.forEach(function(card) {
        var agentId = card.getAttribute('data-agent-id');
        var select = card.querySelector('select');
        var model = select.value;
        promises.push(
            fetch('/api/config/persona/' + agentId, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({model: model})
            }).then(function(r) { return r.json(); })
        );
    });
    Promise.all(promises)
    .then(function(results) {
        var ok = results.filter(function(r) { return r.status === 'ok'; }).length;
        showToast('已保存 ' + ok + ' 位投资大师的模型配置');
    })
    .catch(function(err) {
        showToast('批量保存失败: ' + err.message, 'error');
    });
}
</script>
{% endblock %}
