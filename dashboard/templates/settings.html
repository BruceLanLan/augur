{% extends "base.html" %}
{% block title %}设置 - Augur{% endblock %}
{% block extra_head %}
<style>
.settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 12px;
}
.persona-config-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    transition: border-color 0.2s;
}
.persona-config-row:hover {
    border-color: var(--accent-orange);
}
.persona-config-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border-color);
    object-fit: cover;
    flex-shrink: 0;
}
.persona-config-info {
    flex: 1;
    min-width: 0;
}
.persona-config-name {
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--text-primary);
}
.persona-config-style {
    font-size: 0.7rem;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.save-persona-btn {
    background: transparent;
    border: 1px solid var(--border-color);
    color: var(--accent-orange);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font-ui);
    white-space: nowrap;
}
.save-persona-btn:hover {
    background: var(--accent-orange);
    color: #000;
    border-color: var(--accent-orange);
}
</style>
{% endblock %}

{% block content %}

<div class="flex items-center justify-between mb-24" style="flex-wrap:wrap; gap:12px;">
    <div>
        <h2 style="color:var(--accent-orange); margin:0;">模型配置 <span id="unsaved-indicator" class="unsaved-dot" style="display:none;"></span><span id="unsaved-text" style="display:none; font-size:0.75rem; color:var(--signal-sell); margin-left:4px; font-weight:400;">有未保存更改</span></h2>
        <p class="text-muted" style="font-size:0.82rem; margin:4px 0 0;">为每位投资大师分配 LLM 模型</p>
    </div>
    <div class="flex gap-8">
        <button class="btn btn-sm btn-ghost" onclick="resetAll()" title="重置所有选择为默认值">全部重置</button>
        <button class="btn btn-primary" id="save-all-btn" onclick="saveAll()">全部保存</button>
    </div>
</div>

<!-- Preset buttons -->
<div class="flex gap-8 mb-16" style="flex-wrap:wrap;">
    <button class="btn btn-sm preset-btn" onclick="applyPreset('claude')">全部 Claude</button>
    <button class="btn btn-sm preset-btn" onclick="applyPreset('deepseek-cn')">中国投资人用 DeepSeek</button>
    <button class="btn btn-sm preset-btn" onclick="applyPreset('best')">最强配置</button>
</div>

<div class="settings-grid" id="persona-grid">
    {% for persona in personas %}
    <div class="persona-config-row" data-agent-id="{{ persona.id }}">
        <img src="/docs/images/avatars/{{ persona.id }}.svg"
             alt="{{ persona.name }}"
             class="persona-config-avatar"
             onerror="this.style.display='none'">
        <div class="persona-config-info">
            <div class="persona-config-name">{{ persona.name }}</div>
            <div class="persona-config-style">{{ persona.style }}</div>
        </div>
        <select class="form-select" data-agent-id="{{ persona.id }}" style="min-width:140px; max-width:180px;">
            {% for model in available_models %}
            <option value="{{ model }}" {% if model == persona.current_model %}selected{% endif %}>{{ model }}</option>
            {% endfor %}
        </select>
        <button class="save-persona-btn" onclick="savePersona('{{ persona.id }}')">保存</button>
    </div>
    {% endfor %}
</div>

{% endblock %}

{% block extra_scripts %}
<script>
var originalValues = {};

// Track original values on load for unsaved detection
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.persona-config-row select').forEach(function(sel) {
        var id = sel.getAttribute('data-agent-id');
        originalValues[id] = sel.value;
        sel.addEventListener('change', function() { checkUnsaved(); });
    });
});

function checkUnsaved() {
    var hasChanges = false;
    document.querySelectorAll('.persona-config-row select').forEach(function(sel) {
        var id = sel.getAttribute('data-agent-id');
        if (sel.value !== originalValues[id]) hasChanges = true;
    });
    var dot = document.getElementById('unsaved-indicator');
    var txt = document.getElementById('unsaved-text');
    if (dot) dot.style.display = hasChanges ? 'inline-block' : 'none';
    if (txt) txt.style.display = hasChanges ? 'inline' : 'none';
}

var chineseInvestors = ['duan_yongping', 'zhang_lei', 'li_lu', 'dan_bin', 'dayu'];

function applyPreset(preset) {
    var selects = document.querySelectorAll('.persona-config-row select');
    var unmatchedCount = 0;
    selects.forEach(function(sel) {
        var agentId = sel.getAttribute('data-agent-id');
        var options = sel.options;
        var matched = false;

        if (preset === 'claude') {
            for (var i = 0; i < options.length; i++) {
                if (options[i].value.toLowerCase().indexOf('claude') !== -1) {
                    sel.selectedIndex = i; matched = true; break;
                }
            }
            if (!matched) unmatchedCount++;
        } else if (preset === 'deepseek-cn') {
            if (chineseInvestors.indexOf(agentId) !== -1) {
                for (var i = 0; i < options.length; i++) {
                    if (options[i].value.toLowerCase().indexOf('deepseek') !== -1) {
                        sel.selectedIndex = i; matched = true; break;
                    }
                }
                if (!matched) unmatchedCount++;
            }
        } else if (preset === 'best') {
            if (agentId === 'aschenbrenner') {
                for (var i = 0; i < options.length; i++) {
                    if (options[i].value.toLowerCase().indexOf('claude') !== -1 && options[i].value.toLowerCase().indexOf('opus') !== -1) {
                        sel.selectedIndex = i; matched = true; break;
                    }
                }
                if (!matched) unmatchedCount++;
            } else if (chineseInvestors.indexOf(agentId) !== -1) {
                for (var i = 0; i < options.length; i++) {
                    if (options[i].value.toLowerCase().indexOf('deepseek') !== -1) {
                        sel.selectedIndex = i; matched = true; break;
                    }
                }
                if (!matched) unmatchedCount++;
            } else {
                for (var i = 0; i < options.length; i++) {
                    if (options[i].value.toLowerCase().indexOf('claude') !== -1 && options[i].value.toLowerCase().indexOf('sonnet') !== -1) {
                        sel.selectedIndex = i; matched = true; break;
                    }
                }
                if (!matched) unmatchedCount++;
            }
        }
    });
    checkUnsaved();
    var presetLabel = preset === 'claude' ? '全部Claude' : preset === 'deepseek-cn' ? '中国投资人用DeepSeek' : '最强配置';
    showToast('已应用预设: ' + presetLabel, 'info');
    if (unmatchedCount > 0) {
        showToast('部分投资人未找到匹配模型 (' + unmatchedCount + '位)', 'warning');
    }
}

function getProviderClass(model) {
    if (model.includes('claude')) return 'claude';
    if (model.includes('deepseek')) return 'deepseek';
    if (model.includes('gpt')) return 'gpt';
    if (model.includes('kimi')) return 'kimi';
    return '';
}

function savePersona(agentId) {
    var select = document.querySelector('select[data-agent-id="' + agentId + '"]');
    var model = select.value;
    fetch('/api/config/persona/' + agentId, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({model: model})
    })
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
        if (data.status === 'ok') {
            originalValues[agentId] = model;
            checkUnsaved();
            showToast(agentId + ' 模型已更新为 ' + model);
            // Flash success on the row
            var row = select.closest('.persona-config-row');
            if (row) {
                row.style.borderColor = 'var(--signal-buy)';
                setTimeout(function() { row.style.borderColor = ''; }, 1500);
            }
        } else {
            showToast('保存失败: ' + (data.detail || '未知错误'), 'error');
        }
    })
    .catch(function(err) {
        showToast('请求失败: ' + err.message, 'error');
    });
}

function saveAll() {
    var cards = document.querySelectorAll('.persona-config-row');
    var promises = [];
    cards.forEach(function(card) {
        var agentId = card.getAttribute('data-agent-id');
        var select = card.querySelector('select');
        var model = select.value;
        promises.push(
            fetch('/api/config/persona/' + agentId, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({model: model})
            }).then(function(r) { return r.json(); })
        );
    });
    Promise.all(promises)
    .then(function(results) {
        var ok = results.filter(function(r) { return r.status === 'ok'; }).length;
        var failed = results.length - ok;
        // Update original values
        cards.forEach(function(card) {
            var agentId = card.getAttribute('data-agent-id');
            var select = card.querySelector('select');
            originalValues[agentId] = select.value;
        });
        checkUnsaved();
        if (failed > 0) {
            showToast('已保存 ' + ok + ' 位，' + failed + ' 位保存失败', 'warning');
        } else {
            showToast('已保存 ' + ok + ' 位投资大师的模型配置');
        }
        // Success animation on button
        var btn = document.getElementById('save-all-btn');
        if (btn) {
            var orig = btn.textContent;
            btn.textContent = '\u2713 已保存';
            btn.classList.add('check-pop');
            setTimeout(function() {
                btn.textContent = orig;
                btn.classList.remove('check-pop');
            }, 2000);
        }
    })
    .catch(function(err) {
        showToast('批量保存失败: ' + err.message, 'error');
    });
}

function resetAll() {
    if (!confirm('确定要重置所有模型为默认值吗？')) return;
    document.querySelectorAll('.persona-config-row select').forEach(function(sel) {
        sel.selectedIndex = 0;
    });
    checkUnsaved();
    showToast('已重置为默认值，请点击"全部保存"确认', 'warning');
}

// Warn before leaving with unsaved changes
window.addEventListener('beforeunload', function(e) {
    var hasChanges = false;
    document.querySelectorAll('.persona-config-row select').forEach(function(sel) {
        var id = sel.getAttribute('data-agent-id');
        if (sel.value !== originalValues[id]) hasChanges = true;
    });
    if (hasChanges) {
        e.preventDefault();
        e.returnValue = '';
    }
});
</script>
{% endblock %}
