{% extends "base.html" %}
{% block title %}信号监控 - Augur{% endblock %}
{% block content %}

<h2 style="color:var(--accent-orange); margin-bottom:4px;">信号监控</h2>
<p class="text-muted mb-24" style="font-size:0.82rem;">自选股实时信号追踪，多Agent共识预警</p>

<div class="card" style="max-width:640px; margin:0 auto; text-align:center; padding:48px 24px;">
    <div style="font-size:3rem; margin-bottom:16px;">&#x1F52D;</div>
    <h3 style="color:var(--accent-orange); margin-bottom:8px;">功能开发中</h3>
    <p class="text-muted" style="max-width:400px; margin:0 auto 24px; font-size:0.85rem;">
        信号监控将支持自选股列表批量扫描、信号变化推送，以及实时联动。
    </p>

    <div class="card" style="display:inline-block; text-align:left; padding:16px 24px; background:var(--bg-primary);">
        <div class="data-label mb-8">计划功能</div>
        <div style="font-size:0.82rem; color:var(--text-secondary); line-height:2;">
            <div>&#x2713; 自选股 Watchlist</div>
            <div>&#x2713; 批量扫描 (cron)</div>
            <div>&#x2713; 信号变化推送</div>
            <div>&#x2713; 少数派报告提醒</div>
        </div>
    </div>

    <div style="margin-top:24px;">
        <a href="/stocks" class="btn btn-primary">前往股票分析 &rarr;</a>
    </div>
</div>

{% endblock %}
