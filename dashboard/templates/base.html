<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Augur - 投资大师分析{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="/static/css/bloomberg.css" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <span class="logo-icon">&#x1F989;</span>
                <span class="logo-text">Augur</span>
            </div>

            <button class="sidebar-collapse-btn" onclick="toggleSidebar()" title="折叠侧边栏">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>

            <nav class="sidebar-nav">
                <!-- 分析 Group -->
                <div class="nav-group">
                    <div class="nav-group-label">分析</div>
                    <a class="nav-item" href="/" data-page="home">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                        <span>仪表盘</span>
                    </a>
                    <a class="nav-item" href="/stocks" data-page="stocks">
                        <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18 9l-5 5-2-2-4 4"/></svg>
                        <span>股票分析</span>
                    </a>
                    <a class="nav-item" href="/signals" data-page="signals">
                        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        <span>信号监控</span>
                    </a>
                    <a class="nav-item" href="/backtest" data-page="backtest">
                        <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/><path d="M3 12h1M12 3v1M21 12h1M12 21v1"/></svg>
                        <span>回测</span>
                    </a>
                </div>

                <!-- 投资人 Group -->
                <div class="nav-group">
                    <div class="nav-group-label">投资人</div>
                    <a class="nav-item" href="/personas" data-page="personas">
                        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        <span>人格系统</span>
                    </a>
                    <a class="nav-item" href="/create-persona" data-page="create-persona">
                        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                        <span>创建投资人</span>
                    </a>
                </div>

                <!-- 系统 Group -->
                <div class="nav-group">
                    <div class="nav-group-label">系统</div>
                    <a class="nav-item" href="/settings" data-page="settings">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        <span>设置</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="status-indicator connected">
                    <span class="status-dot"></span>
                    <span class="status-text">系统就绪</span>
                </div>
                <div class="version-info">v5.1</div>
            </div>
        </aside>

        <!-- Mobile backdrop -->
        <div class="mobile-backdrop" id="backdrop" onclick="closeSidebar()"></div>

        <!-- Mobile hamburger -->
        <button class="hamburger-btn" onclick="openSidebar()">
            <svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>

        <!-- Main content -->
        <main class="app-main">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
    // Sidebar toggle
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
        localStorage.setItem('augur-sidebar', document.getElementById('sidebar').classList.contains('collapsed') ? 'collapsed' : 'expanded');
    }
    function openSidebar() {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('backdrop').classList.add('visible');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('backdrop').classList.remove('visible');
    }

    // Restore sidebar state
    document.addEventListener('DOMContentLoaded', function() {
        if (localStorage.getItem('augur-sidebar') === 'collapsed') {
            document.getElementById('sidebar').classList.add('collapsed');
        }
    });

    // Active nav highlight
    document.addEventListener('DOMContentLoaded', function() {
        var path = window.location.pathname;
        document.querySelectorAll('.nav-item').forEach(function(item) {
            var href = item.getAttribute('href');
            if (path === href || (href !== '/' && path.startsWith(href))) {
                item.classList.add('active');
            } else if (href === '/' && path === '/') {
                item.classList.add('active');
            }
        });
    });

    // Toast utility
    function showToast(message, type) {
        type = type || 'success';
        var container = document.getElementById('toast-container');
        if (!container) return;
        var toast = document.createElement('div');
        toast.className = 'toast-msg' + (type === 'error' ? ' toast-error' : type === 'warning' ? ' toast-warning' : '');
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(function() {
            toast.classList.add('removing');
            setTimeout(function() { toast.remove(); }, 300);
        }, 3000);
    }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
