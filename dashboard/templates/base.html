<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>

<body>

    <div class="app-layout">

                <!-- 投资人 Group -->

            <div class="sidebar-footer">

        <!-- Mobile backdrop -->

        <!-- Mobile hamburger -->

        <!-- Main content -->

    <!-- Bottom nav for mobile -->
    <nav class="bottom-nav" id="bottom-nav">

        </a>
        <a class="bottom-nav-item" href="/stocks" data-page="stocks">
            <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18 9l-5 5-2-2-4 4"/></svg>
            <span data-i18n="bottom-analysis">分析</span>
        </a>
        <a class="bottom-nav-item" href="/personas" data-page="personas">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            <span data-i18n="bottom-masters">大师</span>
        </a>
        <a class="bottom-nav-item" href="/backtest" data-page="backtest">
            <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
            <span data-i18n="bottom-backtest">回测</span>
        </a>
        <a class="bottom-nav-item" href="/settings" data-page="settings">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15"/></svg>
            <span data-i18n="bottom-settings">设置</span>
        </a>
    </nav>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container" style="position:fixed;z-index:9999;top:16px;right:16px;"></div>

    <script>
    // Sidebar toggle
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
        localStorage.setItem('augur-sidebar', document.getElementById('sidebar').classList.contains('collapsed') ? 'collapsed' : 'expanded');
    }
    function openSidebar() {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('backdrop').classList.add('visible');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('backdrop').classList.remove('visible');
    }

    // Theme toggle
    function toggleTheme() {
        var html = document.documentElement;
        var isDark = html.classList.contains('dark');
        if (isDark) {
            html.classList.remove('dark');
            html.classList.add('light');
            localStorage.setItem('augur-theme', 'light');
        } else {
            html.classList.remove('light');
            html.classList.add('dark');
            localStorage.setItem('augur-theme', 'dark');
        }
        updateThemeUI();
    }

    function updateThemeUI() {
        var isDark = document.documentElement.classList.contains('dark');
        var icon = document.getElementById('theme-icon');
        var label = document.getElementById('theme-label');
        if (icon) icon.textContent = isDark ? '\u{1F319}' : '\u2600\uFE0F';
        if (label) label.textContent = isDark ? '\u6DF1\u8272' : '\u6D45\u8272';
    }

    // Restore theme on load
    (function() {
        var saved = localStorage.getItem('augur-theme');
        if (saved === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.classList.add('light');
        }
    })();

    // Global progress bar
    function showProgress() {
        var bar = document.getElementById('global-progress-bar');
        if (bar) { bar.classList.remove('done'); bar.classList.add('active'); }
    }
    function hideProgress() {
        var bar = document.getElementById('global-progress-bar');
        if (bar) { bar.classList.remove('active'); bar.classList.add('done'); setTimeout(function() { bar.classList.remove('done'); }, 800); }
    }

    // Restore sidebar state
    document.addEventListener('DOMContentLoaded', function() {
        if (localStorage.getItem('augur-sidebar') === 'collapsed') {
            document.getElementById('sidebar').classList.add('collapsed');
        }
        updateThemeUI();
    });

    // Active nav highlight
    document.addEventListener('DOMContentLoaded', function() {
        var path = window.location.pathname;
        document.querySelectorAll('.nav-item').forEach(function(item) {
            var href = item.getAttribute('href');
            if (path === href || (href !== '/' && path.startsWith(href))) {
                item.classList.add('active');
            } else if (href === '/' && path === '/') {
                item.classList.add('active');
            }
        });
        // Bottom nav highlight
        document.querySelectorAll('.bottom-nav-item').forEach(function(item) {
            var href = item.getAttribute('href');
            if (path === href || (href !== '/' && path.startsWith(href))) {
                item.classList.add('active');
            } else if (href === '/' && path === '/') {
                item.classList.add('active');
            }
        });
    });

    // Toast utility
    function showToast(message, type) {
        type = type || 'success';
        var container = document.getElementById('toast-container');
        if (!container) return;
        var toast = document.createElement('div');
        toast.className = 'toast-msg' + (type === 'error' ? ' toast-error' : type === 'warning' ? ' toast-warning' : '');
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(function() {
            toast.classList.add('removing');
            setTimeout(function() { toast.remove(); }, 300);
        }, 3000);
    }

    // === v5.2 Global Utilities ===

    // Format large numbers (e.g. 1500000000 -> "15.0亿", 23400000 -> "2340.0万")
    function formatNumber(num) {
        if (num === null || num === undefined || isNaN(num)) return '--';
        var abs = Math.abs(num);
        if (abs >= 1e8) return (num / 1e8).toFixed(1) + '亿';
        if (abs >= 1e4) return (num / 1e4).toFixed(1) + '万';
        if (abs >= 1e3) return num.toFixed(0);
        return num.toFixed(2);
    }

    function formatNumberEN(num) {
        if (num === null || num === undefined || isNaN(num)) return '--';
        var abs = Math.abs(num);
        if (abs >= 1e9) return (num / 1e9).toFixed(1) + 'B';
        if (abs >= 1e6) return (num / 1e6).toFixed(1) + 'M';
        if (abs >= 1e3) return (num / 1e3).toFixed(1) + 'K';
        return num.toFixed(2);
    }

    // Relative time (Chinese)
    function relativeTime(timestamp) {
        if (!timestamp) return '';
        var now = Date.now();
        var diff = now - (typeof timestamp === 'number' ? timestamp : new Date(timestamp).getTime());
        if (diff < 0) return '刚刚';
        var seconds = Math.floor(diff / 1000);
        if (seconds < 60) return '刚刚';
        var minutes = Math.floor(seconds / 60);
        if (minutes < 60) return minutes + '分钟前';
        var hours = Math.floor(minutes / 60);
        if (hours < 24) return hours + '小时前';
        var days = Math.floor(hours / 24);
        if (days < 30) return days + '天前';
        var months = Math.floor(days / 30);
        return months + '个月前';
    }

    // Copy to clipboard utility
    function copyToClipboard(text, btn) {
        if (!text) return;
        navigator.clipboard.writeText(text).then(function() {
            if (btn) {
                var orig = btn.textContent;
                btn.textContent = '已复制';
                btn.classList.add('copy-flash');
                setTimeout(function() {
                    btn.textContent = orig;
                    btn.classList.remove('copy-flash');
                }, 1500);
            }
            showToast('已复制到剪贴板');
        }).catch(function() {
            showToast('复制失败', 'error');
        });
    }

    // LocalStorage cache for analysis results
    var augurCache = {
        KEY: 'augur-recent-analyses',
        MAX: 10,
        get: function() {
            try {
                return JSON.parse(localStorage.getItem(this.KEY)) || [];
            } catch(e) { return []; }
        },
        add: function(ticker, result) {
            var list = this.get();
            list = list.filter(function(item) { return item.ticker !== ticker; });
            list.unshift({ ticker: ticker, result: result, time: Date.now() });
            if (list.length > this.MAX) list = list.slice(0, this.MAX);
            localStorage.setItem(this.KEY, JSON.stringify(list));
        },
        getLast: function(n) {
            var items = this.get();
            items.sort(function(a,b){return (b.time||0)-(a.time||0);});
            return items.slice(0, n || 5);
        },
        clear: function() {
            localStorage.removeItem(this.KEY);
        }
    };

    // Escape HTML entities to prevent XSS
    function escapeHtml(str) {
        if (!str) return '';
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    // Lightweight Markdown renderer (handles bold, headers, bullets, checkmarks)
    // NOTE: Content comes from trusted backend Python code (persona reasoning).
    // Do NOT blanket-escape HTML here - it breaks angle brackets in financial
    // comparisons like "P/E < 15" or "ROE > 20%". Use escapeHtml() only for
    // untrusted user content (e.g. custom persona names) inserted via innerHTML.
    function renderMarkdown(md) {
        if (!md) return '';
        return md
            // ## Headings → bold orange label
            .replace(/^#{1,3}\s+(.+)$/gm, '<strong style="color:var(--accent-orange)">$1</strong>')
            // **bold** → bold
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            // Bullet lines (• - *)
            .replace(/^([•\-\*])\s+(.+)$/gm, '<span style="color:var(--text-muted)">&middot;</span> $2')
            // Line breaks
            .replace(/\n/g, '<br>');
    }

    // Rich Markdown renderer for deep reports — supports headings (h1-h3),
    // GitHub-style tables, bold, bullet/numbered lists, blockquotes, hr and
    // paragraphs so the generated report renders like the sample reports in
    // cases/analysis-reports/ instead of a wall of raw text.
    // Inline text is HTML-escaped first (financial "<"/">" stay literal),
    // then a small allow-list of markdown markup is applied.
    function renderReportMarkdown(md) {
        if (!md) return '';
        var esc = function(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        };
        var inline = function(s) {
            return esc(s)
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/`([^`]+?)`/g, '<code class="md-code">$1</code>');
        };
        var lines = md.replace(/\r\n/g, '\n').split('\n');
        var html = '';
        var i = 0;
        var listOpen = null; // 'ul' | 'ol'
        var closeList = function() { if (listOpen) { html += '</' + listOpen + '>'; listOpen = null; } };

        while (i < lines.length) {
            var line = lines[i];
            var trimmed = line.trim();

            // Table block: header row + separator row of dashes
            if (/^\|(.+)\|?$/.test(trimmed) && i + 1 < lines.length && /^\|?[\s:|-]+\|?$/.test(lines[i + 1].trim()) && lines[i + 1].indexOf('-') !== -1) {
                closeList();
                var splitRow = function(r) {
                    return r.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(function(c) { return c.trim(); });
                };
                var headers = splitRow(trimmed);
                i += 2; // skip header + separator
                html += '<div class="md-table-wrap"><table class="md-table"><thead><tr>';
                headers.forEach(function(h) { html += '<th>' + inline(h) + '</th>'; });
                html += '</tr></thead><tbody>';
                while (i < lines.length && /^\|(.+)\|?$/.test(lines[i].trim())) {
                    var cells = splitRow(lines[i]);
                    html += '<tr>';
                    cells.forEach(function(c) { html += '<td>' + inline(c) + '</td>'; });
                    html += '</tr>';
                    i++;
                }
                html += '</tbody></table></div>';
                continue;
            }

            // Headings
            var hMatch = trimmed.match(/^(#{1,6})\s+(.+)$/);
            if (hMatch) {
                closeList();
                var level = Math.min(hMatch[1].length, 4);
                html += '<h' + level + ' class="md-h md-h' + level + '">' + inline(hMatch[2]) + '</h' + level + '>';
                i++; continue;
            }

            // Horizontal rule
            if (/^(-{3,}|\*{3,}|_{3,})$/.test(trimmed)) {
                closeList();
                html += '<hr class="md-hr">';
                i++; continue;
            }

            // Blockquote
            if (/^>\s?/.test(trimmed)) {
                closeList();
                html += '<blockquote class="md-quote">' + inline(trimmed.replace(/^>\s?/, '')) + '</blockquote>';
                i++; continue;
            }

            // Unordered list
            if (/^[-*•]\s+/.test(trimmed)) {
                if (listOpen !== 'ul') { closeList(); html += '<ul class="md-ul">'; listOpen = 'ul'; }
                html += '<li>' + inline(trimmed.replace(/^[-*•]\s+/, '')) + '</li>';
                i++; continue;
            }

            // Ordered list
            if (/^\d+\.\s+/.test(trimmed)) {
                if (listOpen !== 'ol') { closeList(); html += '<ol class="md-ol">'; listOpen = 'ol'; }
                html += '<li>' + inline(trimmed.replace(/^\d+\.\s+/, '')) + '</li>';
                i++; continue;
            }

            // Blank line
            if (trimmed === '') { closeList(); i++; continue; }

            // Paragraph (gather consecutive non-empty, non-special lines)
            closeList();
            var para = [trimmed];
            i++;
            while (i < lines.length) {
                var nxt = lines[i].trim();
                if (nxt === '' || /^(#{1,6})\s+/.test(nxt) || /^[-*•]\s+/.test(nxt) ||
                    /^\d+\.\s+/.test(nxt) || /^>\s?/.test(nxt) || /^\|(.+)\|?$/.test(nxt) ||
                    /^(-{3,}|\*{3,}|_{3,})$/.test(nxt)) break;
                para.push(nxt);
                i++;
            }
            html += '<p class="md-p">' + inline(para.join(' ')) + '</p>';
        }
        closeList();
        return html;
    }

    // Elapsed-time + staged progress messaging for long-running requests
    // (analysis runs 18 agents, so feedback prevents "is it frozen?" anxiety).
    var augurTimers = {};
    function startProgress(elId, opts) {
        opts = opts || {};
        var el = document.getElementById(elId);
        if (!el) return;
        var stages = opts.stages || [
            '正在唤醒 18 位投资大师...',
            '大师们正在独立研读财务数据...',
            '正在汇总多空观点、计算共识...',
            '马上就好，正在生成最终结论...'
        ];
        var prefix = opts.prefix || '';
        var start = Date.now();
        if (augurTimers[elId]) clearInterval(augurTimers[elId]);
        function tick() {
            var secs = Math.floor((Date.now() - start) / 1000);
            var stageIdx = Math.min(Math.floor(secs / 8), stages.length - 1);
            el.textContent = prefix + stages[stageIdx] + ' (' + secs + 's)';
        }
        tick();
        augurTimers[elId] = setInterval(tick, 1000);
    }
    function stopProgress(elId) {
        if (augurTimers[elId]) { clearInterval(augurTimers[elId]); delete augurTimers[elId]; }
    }

    // fetch() wrapper with a timeout so a hung/slow backend surfaces a clear
    // actionable error instead of an endless spinner ("点击没反应" feeling).
    function fetchWithTimeout(url, options, timeoutMs) {
        options = options || {};
        timeoutMs = timeoutMs || 90000;
        if (typeof AbortController === 'undefined') return fetch(url, options);
        var controller = new AbortController();
        var timer = setTimeout(function() { controller.abort(); }, timeoutMs);
        options.signal = controller.signal;
        showProgress();
        return fetch(url, options).finally(function() { clearTimeout(timer); hideProgress(); });
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        var tag = (e.target.tagName || '').toLowerCase();
        var inInput = (tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable);

        // Ctrl+K or / (not in input) -> focus ticker input
        if ((e.key === '/' && !inInput) || (e.key === 'k' && (e.ctrlKey || e.metaKey))) {
            e.preventDefault();
            var tickerInput = document.getElementById('hero-ticker') || document.getElementById('inp-ticker') || document.getElementById('quick-ticker');
            if (tickerInput) { tickerInput.focus(); tickerInput.select(); }
            return;
        }

        // Ctrl+Enter -> submit current form
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            var primaryBtn = document.querySelector('.btn-primary');
            if (primaryBtn) primaryBtn.click();
            return;
        }

        // Escape -> close expanded cards or modals
        if (e.key === 'Escape') {
            // Close expanded persona rows
            document.querySelectorAll('.persona-row.expanded').forEach(function(row) {
                row.classList.remove('expanded');
            });
            // Close expanded agent reasoning
            document.querySelectorAll('.agent-reasoning.expanded').forEach(function(div) {
                div.classList.remove('expanded');
            });
            // Close mobile sidebar
            closeSidebar();
            return;
        }

        // Number keys 1-5 for quick navigation (not in input)
        if (!inInput && !e.ctrlKey && !e.metaKey && !e.altKey) {
            var navMap = { '1': '/', '2': '/stocks', '3': '/signals', '4': '/personas', '5': '/backtest', '6': '/settings' };
            if (navMap[e.key]) {
                window.location.href = navMap[e.key];
                return;
            }
        }
    });

    // Connection status - ping /health every 30s
    (function() {
        var statusDot = document.querySelector('.status-dot');
        var statusText = document.querySelector('.status-text');
        var indicator = document.querySelector('.status-indicator');
        if (!statusDot) return;

        var healthCheckTimer = null;

        function checkHealth() {
            fetch('/health', { method: 'GET' })
                .then(function(r) {
                    if (r.ok) {
                        indicator.classList.add('connected');
                        indicator.classList.remove('disconnected');
                        statusText.textContent = '系统就绪';
                    } else {
                        indicator.classList.remove('connected');
                        indicator.classList.add('disconnected');
                        statusText.textContent = '连接异常';
                    }
                })
                .catch(function() {
                    indicator.classList.remove('connected');
                    indicator.classList.add('disconnected');
                    statusText.textContent = '连接断开';
                });
        }

        function startHealthCheck() {
            if (healthCheckTimer) clearInterval(healthCheckTimer);
            healthCheckTimer = setInterval(checkHealth, 30000);
        }

        // Pause polling when page is hidden, resume when visible
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                if (healthCheckTimer) { clearInterval(healthCheckTimer); healthCheckTimer = null; }
            } else {
                checkHealth();
                startHealthCheck();
            }
        });

        startHealthCheck();
    })();
    </script>
    <script src="/static/js/i18n.js?v=7.6.0"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
