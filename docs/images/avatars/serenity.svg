  <line x1="54" y1="85" x2="52" y2="85" stroke="#4db6ac" stroke-width="1"/>
  <line x1="66" y1="81" x2="68" y2="81" stroke="#4db6ac" stroke-width="1"/>
  <line x1="66" y1="85" x2="68" y2="85" stroke="#4db6ac" stroke-width="1"/>
