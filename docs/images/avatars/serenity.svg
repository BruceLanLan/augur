<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <clipPath id="circle"><circle cx="60" cy="52" r="45"/></clipPath>
  </defs>
  <circle cx="60" cy="52" r="45" fill="#b2dfdb" stroke="#000" stroke-width="3"/>
  <!-- Hair (messy tech bro style) -->
