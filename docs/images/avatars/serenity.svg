  <path d="M50,62 Q60,66 70,62" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Hoodie (teal semiconductor theme) -->
  <rect x="28" y="72" width="64" height="28" rx="6" fill="#009688" stroke="#000" stroke-width="2.5"/>
  <path d="M44,72 L60,84 L76,72" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Circuit pattern on hoodie -->
  <path d="M34,84 L40,84 L40,88 L46,88" fill="none" stroke="#4db6ac" stroke-width="1.5"/>
