    <rect width="135" height="40" rx="4" fill="#0f172a" stroke="#a78bfa" stroke-width="0.8"/>
    <text x="67" y="22" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#a78bfa">ARPS</text><text x="67" y="34" text-anchor="middle" font-family="Arial" font-size="6" fill="#64748b">Crypto/黄金</text>
  </g>
  <g transform="translate(770,230)">
    <rect width="135" height="40" rx="4" fill="#0f172a" stroke="#fbbf24" stroke-width="0.8"/>
    <text x="67" y="22" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#fbbf24">大宇</text><text x="67" y="34" text-anchor="middle" font-family="Arial" font-size="6" fill="#64748b">看准重仓</text>
  </g>

  <!-- Row 3 - just Thiel -->
