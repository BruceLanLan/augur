<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.3"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="url(#bg)"/>
  <rect width="1000" height="600" fill="url(#grid)"/>

  <text x="500" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#f8fafc">System Architecture</text>

  <!-- Layer 1: UI -->
  <rect x="30" y="45" width="940" height="80" rx="6" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="45" y="62" font-family="Arial" font-size="9" fill="#fbbf24">UI Layer</text>
  
  <rect x="50" y="70" width="200" height="45" rx="4" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
  <text x="150" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#fbbf24">🌐 Hermes Web UI</text>
  <text x="150" y="106" text-anchor="middle" font-family="Arial" font-size="7" fill="#94a3b8">Node.js · React · Socket.IO</text>

  <rect x="300" y="70" width="220" height="45" rx="4" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
  <text x="410" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#fbbf24">🦉 FastAPI Dashboard</text>
  <text x="410" y="106" text-anchor="middle" font-family="Arial" font-size="7" fill="#94a3b8">Bloomberg Style · Live Charts</text>

  <rect x="570" y="70" width="150" height="45" rx="4" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
  <text x="645" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#fbbf24">💻 CLI</text>
  <text x="645" y="106" text-anchor="middle" font-family="Arial" font-size="7" fill="#94a3b8">Scripts · Cron</text>

  <rect x="770" y="70" width="180" height="45" rx="4" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
  <text x="860" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#fbbf24">📱 Hermes Agent</text>
  <text x="860" y="106" text-anchor="middle" font-family="Arial" font-size="7" fill="#94a3b8">Telegram · Discord · Slack</text>

  <line x1="250" y1="92" x2="300" y2="92" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="520" y1="92" x2="570" y2="92" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Arrow UI → Engine -->
  <line x1="500" y1="125" x2="500" y2="155" stroke="#475569" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

