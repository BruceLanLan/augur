    <rect width="135" height="40" rx="4" fill="#0f172a" stroke="#fb7185" stroke-width="0.8"/>
    <text x="67" y="22" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#fb7185">Peter Thiel</text><text x="67" y="34" text-anchor="middle" font-family="Arial" font-size="6" fill="#64748b">从0到1</text>
