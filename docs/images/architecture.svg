  </g>
  <g transform="translate(335,230)">
    <rect width="135" height="40" rx="4" fill="#0f172a" stroke="#34d399" stroke-width="0.8"/>
    <text x="67" y="22" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#34d399">Fisher</text><text x="67" y="34" text-anchor="middle" font-family="Arial" font-size="6" fill="#64748b">成长股</text>
  </g>
  <g transform="translate(480,230)">
    <rect width="135" height="40" rx="4" fill="#0f172a" stroke="#a78bfa" stroke-width="0.8"/>
