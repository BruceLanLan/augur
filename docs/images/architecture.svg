    <text x="67" y="22" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#fbbf24">YAML自定义</text><text x="67" y="34" text-anchor="middle" font-family="Arial" font-size="6" fill="#64748b">personas/custom/*</text>
