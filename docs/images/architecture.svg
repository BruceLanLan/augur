  <text x="45" y="522" font-family="Arial" font-size="9" fill="#fbbf24">Data Sources</text>

  <g transform="translate(50,530)">
    <rect width="165" height="22" rx="3" fill="#0f172a" stroke="#fbbf24" stroke-width="0.6"/>
    <text x="82" y="16" text-anchor="middle" font-family="Arial" font-size="8" fill="#fbbf24">📊 yfinance</text>
  </g>
  <g transform="translate(235,530)">
    <rect width="165" height="22" rx="3" fill="#0f172a" stroke="#fbbf24" stroke-width="0.6"/>
    <text x="82" y="16" text-anchor="middle" font-family="Arial" font-size="8" fill="#fbbf24">📈 宏观(SPY/VIX/TNX)</text>
  </g>
  <g transform="translate(420,530)">
    <rect width="165" height="22" rx="3" fill="#0f172a" stroke="#fbbf24" stroke-width="0.6"/>
    <text x="82" y="16" text-anchor="middle" font-family="Arial" font-size="8" fill="#fbbf24">💾 Parquet价格仓</text>
  </g>
  <g transform="translate(605,530)">
    <rect width="165" height="22" rx="3" fill="#0f172a" stroke="#fbbf24" stroke-width="0.6"/>
    <text x="82" y="16" text-anchor="middle" font-family="Arial" font-size="8" fill="#fbbf24">📋 PIT基本面(45d lag)</text>
  </g>
  <g transform="translate(790,530)">
    <rect width="160" height="22" rx="3" fill="#0f172a" stroke="#fbbf24" stroke-width="0.6"/>
    <text x="80" y="16" text-anchor="middle" font-family="Arial" font-size="8" fill="#fbbf24">📰 Evolution DB</text>
  </g>

  <text x="500" y="585" text-anchor="middle" font-family="Arial" font-size="9" fill="#475569">Data → Analysis → Consensus → Output</text>
</svg>
