    <text x="105" y="38" text-anchor="middle" font-family="Arial" font-size="7" fill="#64748b">行业权重 · 机制路由 · 滚动IC</text>
    <text x="105" y="50" text-anchor="middle" font-family="Arial" font-size="7" fill="#64748b">相关性惩罚 · Meta Model</text>
  </g>
  <g transform="translate(290,410)">
    <rect width="210" height="55" rx="4" fill="#0f172a" stroke="#a78bfa" stroke-width="0.8"/>
