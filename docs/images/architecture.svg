    <text x="105" y="38" text-anchor="middle" font-family="Arial" font-size="7" fill="#64748b">Kelly Sizer · Calmar Ratio</text>
    <text x="105" y="50" text-anchor="middle" font-family="Arial" font-size="7" fill="#64748b">VaR · 熔断惩罚 · Veto</text>
  </g>
  <g transform="translate(530,410)">
    <rect width="210" height="55" rx="4" fill="#0f172a" stroke="#a78bfa" stroke-width="0.8"/>
    <text x="105" y="23" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#a78bfa">📈 Optimization</text>
    <text x="105" y="38" text-anchor="middle" font-family="Arial" font-size="7" fill="#64748b">Bayesian调参 · 多时间窗口</text>
    <text x="105" y="50" text-anchor="middle" font-family="Arial" font-size="7" fill="#64748b">相关性矩阵 · 预测追踪</text>
  </g>
  <g transform="translate(770,410)">
    <rect width="180" height="55" rx="4" fill="#0f172a" stroke="#a78bfa" stroke-width="0.8"/>
    <text x="90" y="23" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#a78bfa">🧬 Evolution</text>
    <text x="90" y="38" text-anchor="middle" font-family="Arial" font-size="7" fill="#64748b">PersonaTracker</text>
    <text x="90" y="50" text-anchor="middle" font-family="Arial" font-size="7" fill="#64748b">风格漂移 · 事件时间线</text>
  </g>

  <!-- Arrow Consensus → Data -->
