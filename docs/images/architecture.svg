  <text x="45" y="172" font-family="Arial" font-size="9" fill="#22d3ee">Analysis Engine — 13 Investment Personas</text>

  <!-- Row 1 of agents -->
  <g transform="translate(45,180)">
    <rect width="135" height="40" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="0.8"/>
    <text x="67" y="22" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#22d3ee">Buffett</text>
    <text x="67" y="34" text-anchor="middle" font-family="Arial" font-size="6" fill="#64748b">护城河</text>
  </g>
  <g transform="translate(190,180)">
    <rect width="135" height="40" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="0.8"/>
    <text x="67" y="22" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#22d3ee">Graham</text>
    <text x="67" y="34" text-anchor="middle" font-family="Arial" font-size="6" fill="#64748b">安全边际</text>
  </g>
  <g transform="translate(335,180)">
    <rect width="135" height="40" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="0.8"/>
    <text x="67" y="22" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#22d3ee">Lynch</text>
    <text x="67" y="34" text-anchor="middle" font-family="Arial" font-size="6" fill="#64748b">GARP</text>
  </g>
  <g transform="translate(480,180)">
    <rect width="135" height="40" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="0.8"/>
    <text x="67" y="22" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#22d3ee">Dalio</text>
    <text x="67" y="34" text-anchor="middle" font-family="Arial" font-size="6" fill="#64748b">全天候</text>
  </g>
  <g transform="translate(625,180)">
    <rect width="135" height="40" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="0.8"/>
    <text x="67" y="22" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#22d3ee">Munger</text>
    <text x="67" y="34" text-anchor="middle" font-family="Arial" font-size="6" fill="#64748b">格栅理论</text>
  </g>
  <g transform="translate(770,180)">
    <rect width="135" height="40" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="0.8"/>
    <text x="67" y="22" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#22d3ee">Soros</text>
    <text x="67" y="34" text-anchor="middle" font-family="Arial" font-size="6" fill="#64748b">反身性</text>
  </g>

