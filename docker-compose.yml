services:
  # Dashboard + API (默认)
  dashboard:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - augur-config:/app/.augur
      - ./config:/app/config
    environment:
      - AUGUR_CONFIG=/app/config/agents.yaml
    command: ["python", "-m", "dashboard.app", "--port", "8000", "--cors"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # REST API (独立端口)
  api:
    build: .
    ports:
      - "8900:8900"
    volumes:
      - augur-config:/app/.augur
      - ./config:/app/config
    command: ["augur", "api", "--port", "8900"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8900/health')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    profiles: ["full"]

  # MCP Server (stdio, for integration)
  mcp:
    build: .
    stdin_open: true
    tty: true
    volumes:
      - augur-config:/app/.augur
      - ./config:/app/config
    command: ["augur", "mcp-server"]
    profiles: ["mcp"]

  # Telegram Bot
  telegram:
    build: .
    volumes:
      - augur-config:/app/.augur
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
    command: ["augur", "telegram"]
    restart: unless-stopped
    profiles: ["telegram"]

  # Slack Bot
  slack:
    build: .
    volumes:
      - augur-config:/app/.augur
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
    command: ["augur", "slack"]
    restart: unless-stopped
    profiles: ["slack"]

  # GeWeChat Docker (个人微信协议服务)
  gewe:
    image: registry.cn-chengdu.aliyuncs.com/gewechat/gewechat:latest
    container_name: gewechat
    ports:
      - "2531:2531"
      - "2532:2532"
    volumes:
      - gewe-data:/root/temp
    restart: unless-stopped
    profiles: ["wechat"]

  # WeChat Bot (个人微信 - 推荐)
  wechat:
    build: .
    ports:
      - "8066:8066"
    volumes:
      - augur-config:/app/.augur
    environment:
      - GEWECHAT_BASE_URL=http://gewe:2531/v2/api
      - GEWECHAT_TOKEN=${GEWECHAT_TOKEN}
      - GEWECHAT_APP_ID=${GEWECHAT_APP_ID}
    command: ["augur", "wechat", "--mode", "personal", "--port", "8066"]
    depends_on:
      - gewe
    restart: unless-stopped
    profiles: ["wechat"]

  # Lark/飞书 Bot
  lark:
    build: .
    ports:
      - "9000:9000"
    volumes:
      - augur-config:/app/.augur
    environment:
      - LARK_APP_ID=${LARK_APP_ID}
      - LARK_APP_SECRET=${LARK_APP_SECRET}
      - LARK_VERIFICATION_TOKEN=${LARK_VERIFICATION_TOKEN}
      - LARK_ENCRYPT_KEY=${LARK_ENCRYPT_KEY}
    command: ["augur", "lark", "--mode", "event", "--port", "9000"]
    restart: unless-stopped
    profiles: ["lark"]

  # Cron Scheduler (定时分析)
  cron:
    build: .
    volumes:
      - augur-config:/app/.augur
      - ./config:/app/config
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - WECHAT_WEBHOOK_URL=${WECHAT_WEBHOOK_URL}
      - LARK_WEBHOOK_URL=${LARK_WEBHOOK_URL}
    command: ["augur", "cron-start"]
    restart: unless-stopped
    profiles: ["cron"]

volumes:
  augur-config:
  gewe-data:
